<!doctype html>

<html>
  <head>
    <title>Kupujem Prodajem Automobili</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body>
    <div class="mainDiv">
      <div class="subDiv">
        <img
          class="carImage"
          src="slike/oglas_slika_1.jpg"
          alt="Slika auta za oglas"
        />
        <h3 class="titleColor">Volkswagen Golf 5</h3>
        <img
          class="icons"
          src="icons/package-box-ui-2-svgrepo-com.svg"
          alt="package icon"
        />
        <p class="paragraphDiv">Požarevac</p>
      </div>

      <div class="subDiv boldSubDiv">
        <img
          class="icons"
          src="icons/calendar-plus-alt-svgrepo-com (1).svg"
          alt="calendar icon"
        />
        <p class="paragraphDiv">2008</p>

        <img
          class="icons"
          src="icons/road-alt-svgrepo-com.svg"
          alt="road icon"
        />
        <p class="paragraphDiv">280.000km</p>

        <img
          class="icons"
          src="icons/gas-pump-svgrepo-com.svg"
          alt="gas pump icon"
        />
        <p class="paragraphDiv">Dizel</p>
      </div>

      <div class="subDiv">
        <img class="icons" src="icons/eye-svgrepo-com.svg" alt="eye icon" />
        <p class="paragraphDiv">4702</p>

        <img class="icons" src="icons/heart-svgrepo-com.svg" alt="heart icon" />
        <p class="paragraphDiv">3698</p>

        <img
          class="icons"
          src="icons/clock-circle-svgrepo-com.svg"
          alt="clock icon"
        />
        <p class="paragraphDiv">danas</p>
      </div>

      <div class="priceDiv">
        <p>5.100 &euro;</p>
      </div>
    </div>

    <div class="mainDiv">
      <div class="subDiv">
        <img
          class="carImage"
          src="slike/oglas_slika_2.jpg"
          alt="Slika auta za oglas"
        />
        <h3 class="titleColor">Alfa Romeo 147</h3>
        <img
          class="icons"
          src="icons/package-box-ui-2-svgrepo-com.svg"
          alt="package icon"
        />
        <p class="paragraphDiv">Beograd</p>
      </div>

      <div class="subDiv boldSubDiv">
        <img
          class="icons"
          src="icons/calendar-plus-alt-svgrepo-com (1).svg"
          alt="calendar icon"
        />
        <p class="paragraphDiv">2002</p>

        <img
          class="icons"
          src="icons/road-alt-svgrepo-com.svg"
          alt="road icon"
        />
        <p class="paragraphDiv">400.000km</p>

        <img
          class="icons"
          src="icons/gas-pump-svgrepo-com.svg"
          alt="gas pump icon"
        />
        <p class="paragraphDiv">Benzin</p>
      </div>

      <div class="subDiv">
        <img class="icons" src="icons/eye-svgrepo-com.svg" alt="eye icon" />
        <p class="paragraphDiv">1570</p>

        <img class="icons" src="icons/heart-svgrepo-com.svg" alt="heart icon" />
        <p class="paragraphDiv">1230</p>

        <img
          class="icons"
          src="icons/clock-circle-svgrepo-com.svg"
          alt="clock icon"
        />
        <p class="paragraphDiv">pre 4 dana</p>
      </div>

      <div class="priceDiv">
        <p>670 &euro;</p>
      </div>
    </div>
  </body>
</html>
